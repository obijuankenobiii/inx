<!doctype html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<title>Inx - Tags</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Atkinson Hyperlegible", system-ui, sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.45; letter-spacing: 0; }
  .container { max-width: 760px; margin: 0 auto; padding: 28px 18px; }
  .header { text-align: center; margin-bottom: 22px; }
  .header h1 { font-size: 26px; font-weight: 700; color: #111; letter-spacing: -0.03em; margin-bottom: 2px; }
  .nav-links { display: flex; justify-content: center; gap: 2px; margin-bottom: 22px; padding-bottom: 8px; border-bottom: 1px solid #ebebeb; flex-wrap: wrap; }
  .nav-btn { padding: 6px 12px; background: transparent; color: #555; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 500; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .nav-btn:hover { background: #eee; color: #111; }
  .nav-btn.active { background: #111; color: #fff; }
  .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #eee; }
  .card + .card { margin-top: 16px; }
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .title { font-size: 18px; font-weight: 700; color: #111; }
  .summary { font-size: 13px; color: #6e6e73; }
  .search, .new-tag-input { width: 240px; max-width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font: inherit; }
  .toolbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .icon-btn { width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; font-size: 21px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { border-color: #111; background: #f5f5f5; }
  .new-tag-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .add-btn { padding: 10px 18px; background: #111; color: #fff; border: none; border-radius: 8px; font: inherit; cursor: pointer; }
  .tag-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-pill { padding: 5px 8px 5px 10px; border-radius: 999px; background: #eee; color: #111; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
  .tag-actions { display: inline-flex; align-items: center; gap: 2px; }
  .tag-mini-btn { border: none; background: rgba(255,255,255,.7); color: #333; border-radius: 999px; padding: 3px 7px; font: inherit; font-size: 11px; cursor: pointer; }
  .tag-mini-btn:hover { background: #111; color: #fff; }
  .tag-mini-btn.danger:hover { background: #ff3b30; color: #fff; }
  .book-list { display: flex; flex-direction: column; gap: 8px; }
  .book-row { display: grid; grid-template-columns: 1fr 210px; gap: 14px; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .book-row:last-child { border-bottom: none; }
  .book-title { font-size: 14px; font-weight: 700; color: #111; word-break: break-word; }
  .book-path { font-size: 12px; color: #777; margin-top: 2px; word-break: break-word; }
  .tag-input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font: inherit; font-size: 14px; background: #fff; }
  .tag-input:focus, .search:focus, .new-tag-input:focus { outline: none; border-color: #111; box-shadow: 0 0 0 2px rgba(0,0,0,.06); }
  .status { color: #777; font-size: 13px; padding: 32px 0; text-align: center; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1d1d1f; color: #fff; padding: 10px 20px; border-radius: 980px; font-size: 13px; opacity: 0; transition: opacity .25s ease; pointer-events: none; }
  .toast.show { opacity: 1; }
  .index-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(250,250,250,.72); backdrop-filter: blur(2px); z-index: 20; }
  .index-overlay.open { display: flex; }
  .index-modal { width: min(300px, calc(100vw - 36px)); background: #111; color: #fff; border: 2px solid #fff; border-radius: 12px; padding: 22px 20px; text-align: center; box-shadow: 0 12px 36px rgba(0,0,0,.22); }
  .spinner { width: 28px; height: 28px; margin: 0 auto 12px; border: 3px solid rgba(255,255,255,.28); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
  .index-title { font-size: 18px; font-weight: 700; }
  .index-detail { margin-top: 4px; font-size: 12px; color: #cfcfcf; min-height: 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 680px) {
    .container { padding: 28px 16px; }
    .header h1 { font-size: 22px; }
    .nav-links { gap: 6px; }
    .nav-btn { padding: 6px 14px; font-size: 13px; }
    .book-row { grid-template-columns: 1fr; gap: 8px; }
    .toolbar-actions, .search { width: 100%; }
  }
</style>
<div class="container">
  <div class="header"><h1>Book Tags</h1></div>
  <div class="nav-links">
    <a class="nav-btn" href="/">Dashboard</a>
    <a class="nav-btn" href="/files">Files</a>
    <a class="nav-btn" href="/epub">Epub</a>
    <a class="nav-btn active" href="/tags">Tags</a>
    <a class="nav-btn" href="/font-manager">Fonts</a>
    <a class="nav-btn" href="/export">Bookmarks &amp; Annotations</a>
    <a class="nav-btn" href="/settings">Settings</a>
  </div>
  <div class="card">
    <div class="toolbar">
      <div>
        <div class="title">Tag List</div>
        <div class="summary" id="tagSummary">Reusable tags</div>
      </div>
    </div>
    <div class="new-tag-row">
      <input class="new-tag-input" id="newTagInput" placeholder="New tag" autocomplete="off">
      <button class="add-btn" onclick="addTag()">Add</button>
    </div>
    <div class="tag-list" id="tagList"></div>
  </div>
  <div class="card">
    <div class="toolbar">
      <div>
        <div class="title">Indexed Books</div>
        <div class="summary" id="summary">Loading...</div>
      </div>
      <div class="toolbar-actions">
        <button class="icon-btn" onclick="refreshIndex()" title="Refresh index" aria-label="Refresh index">&#8635;</button>
        <input class="search" id="search" placeholder="Search books or tags" autocomplete="off">
      </div>
    </div>
    <div id="bookList" class="book-list"><div class="status">Loading...</div></div>
  </div>
  <datalist id="tagOptions"></datalist>
</div>
<div class="index-overlay" id="indexOverlay">
  <div class="index-modal">
    <div class="spinner"></div>
    <div class="index-title">Indexing</div>
    <div class="index-detail" id="indexDetail"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let books = [];
let tags = [];
let saveTimers = {};
let indexPollTimer = null;

function escapeHtml(s) {
  return s ? s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]) : "";
}

function showToast(msg, err) {
  const n = document.getElementById("toast");
  n.textContent = msg;
  n.style.background = err ? "#ff3b30" : "#1d1d1f";
  n.classList.add("show");
  setTimeout(() => n.classList.remove("show"), 1600);
}

async function loadBooks() {
  try {
    const r = await fetch("/api/book-tags");
    const data = await r.json();
    if (!data.indexed) {
      document.getElementById("summary").textContent = "Library index is required.";
      document.getElementById("bookList").innerHTML = '<div class="status">Enable and build the library index first.</div>';
      return;
    }
    tags = data.tags || [];
    books = data.books || [];
    renderTags();
    renderBooks();
  } catch (e) {
    document.getElementById("bookList").innerHTML = '<div class="status">Failed to load indexed books.</div>';
  }
}

function setIndexing(open, detail) {
  document.getElementById("indexOverlay").classList.toggle("open", !!open);
  document.getElementById("indexDetail").textContent = detail || "";
}

async function refreshIndex() {
  try {
    setIndexing(true, "");
    const r = await fetch("/api/library-index/refresh", { method: "POST" });
    if (!r.ok) throw new Error("index failed");
    pollIndexStatus();
  } catch (e) {
    setIndexing(false, "");
    showToast("Failed to start indexing", true);
  }
}

async function pollIndexStatus() {
  clearTimeout(indexPollTimer);
  try {
    const r = await fetch("/api/library-index/status");
    const s = await r.json();
    let detail = "";
    if (s.total > 0) detail = s.current + " / " + s.total;
    setIndexing(s.indexing, detail);
    if (s.indexing) {
      indexPollTimer = setTimeout(pollIndexStatus, 850);
      return;
    }
    await loadBooks();
    showToast("Index refreshed");
  } catch (e) {
    setIndexing(false, "");
    showToast("Index status failed", true);
  }
}

function renderTags() {
  const tagList = document.getElementById("tagList");
  const opts = document.getElementById("tagOptions");
  document.getElementById("tagSummary").textContent = tags.length ? tags.length + " reusable tags" : "No tags yet";
  opts.innerHTML = tags.map(t => '<option value="' + escapeHtml(t) + '"></option>').join("");
  tagList.innerHTML = tags.length ? tags.map(t => {
    const safeTag = escapeHtml(t);
    return '<span class="tag-pill"><span>' + safeTag + '</span><span class="tag-actions"><button class="tag-mini-btn tag-edit-btn" data-tag="' + safeTag + '">Edit</button><button class="tag-mini-btn danger tag-delete-btn" data-tag="' + safeTag + '">Delete</button></span></span>';
  }).join("") : '<div class="summary">Create tags here, then reuse them below.</div>';
  document.querySelectorAll(".tag-edit-btn").forEach(btn => {
    btn.addEventListener("click", () => renameTag(btn.dataset.tag || ""));
  });
  document.querySelectorAll(".tag-delete-btn").forEach(btn => {
    btn.addEventListener("click", () => deleteTag(btn.dataset.tag || ""));
  });
}

function renderBooks() {
  const q = (document.getElementById("search").value || "").toLowerCase();
  const filtered = books.filter(b => {
    return !q || (b.title || "").toLowerCase().includes(q) || (b.path || "").toLowerCase().includes(q) || (b.tag || "").toLowerCase().includes(q);
  });
  document.getElementById("summary").textContent = filtered.length + " / " + books.length + " books";
  if (!filtered.length) {
    document.getElementById("bookList").innerHTML = '<div class="status">No matching books.</div>';
    return;
  }
  document.getElementById("bookList").innerHTML = filtered.map(b => {
    return '<div class="book-row"><div><div class="book-title">' + escapeHtml(b.title || "Untitled") + '</div><div class="book-path">' + escapeHtml(b.path || "") + '</div></div><input class="tag-input" list="tagOptions" value="' + escapeHtml(b.tag || "") + '" placeholder="Tag" data-path="' + escapeHtml(b.path || "") + '"></div>';
  }).join("");
  document.querySelectorAll(".tag-input").forEach(input => {
    input.addEventListener("input", () => queueSave(input));
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        saveTag(input);
        input.blur();
      }
    });
    input.addEventListener("blur", () => saveTag(input));
  });
}

async function addTag() {
  const input = document.getElementById("newTagInput");
  const tag = input.value.trim();
  if (!tag) return;
  try {
    const ok = (await fetch("/api/book-tags", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "addTag", tag })
    })).ok;
    if (!ok) throw new Error("save failed");
    if (!tags.includes(tag)) tags.push(tag);
    tags.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    input.value = "";
    renderTags();
    renderBooks();
    showToast("Tag added");
  } catch (e) {
    showToast("Failed to add tag", true);
  }
}

async function renameTag(oldTag) {
  const newTag = (prompt("Rename tag", oldTag) || "").trim();
  if (!newTag || newTag === oldTag) return;
  try {
    const ok = (await fetch("/api/book-tags", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "renameTag", oldTag, newTag })
    })).ok;
    if (!ok) throw new Error("rename failed");
    tags = tags.map(t => t === oldTag ? newTag : t).filter((t, i, a) => a.indexOf(t) === i);
    tags.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    books.forEach(b => { if (b.tag === oldTag) b.tag = newTag; });
    renderTags();
    renderBooks();
    showToast("Tag renamed");
  } catch (e) {
    showToast("Failed to rename tag", true);
  }
}

async function deleteTag(tag) {
  if (!confirm('Delete tag "' + tag + '" and clear it from matching books?')) return;
  try {
    const ok = (await fetch("/api/book-tags", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "deleteTag", tag })
    })).ok;
    if (!ok) throw new Error("delete failed");
    tags = tags.filter(t => t !== tag);
    books.forEach(b => { if (b.tag === tag) b.tag = ""; });
    renderTags();
    renderBooks();
    showToast("Tag deleted");
  } catch (e) {
    showToast("Failed to delete tag", true);
  }
}

function queueSave(input) {
  const path = input.dataset.path;
  clearTimeout(saveTimers[path]);
  saveTimers[path] = setTimeout(() => saveTag(input), 700);
}

async function saveTag(input) {
  const path = input.dataset.path;
  clearTimeout(saveTimers[path]);
  const tag = input.value.trim();
  const book = books.find(b => b.path === path);
  if (book && (book.tag || "") === tag) return;
  try {
    const ok = (await fetch("/api/book-tags", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path, tag })
    })).ok;
    if (!ok) throw new Error("save failed");
    if (book) book.tag = tag;
    if (tag && !tags.includes(tag)) {
      tags.push(tag);
      tags.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
      renderTags();
    }
    showToast(tag ? "Tag saved" : "Tag cleared");
  } catch (e) {
    showToast("Failed to save tag", true);
  }
}

document.getElementById("search").addEventListener("input", renderBooks);
document.getElementById("newTagInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    addTag();
  }
});
loadBooks();
</script>
</html>
