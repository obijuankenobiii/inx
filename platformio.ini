[platformio]
default_envs = default

[inx]
version = 1.0.16

[base]
platform = espressif32 @ 6.12.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --suppress=constVariableReference:*FontManager.cpp --suppress=useStlAlgorithm:*FontManager.cpp --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -I${PROJECT_DIR}/src/system
  -Iopen-x4-sdk/libs/hardware/SDCardManager/include
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=c++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

build_src_filter =
  +<*>
  -<simulator/>

; DRAM vs heap: ESP32-C3 devkit has no PSRAM — freeing large consumers (e.g. SD fonts during EPUB ZIP) is the
; practical way to make inflate/GFX allocations succeed. Boards with OPI PSRAM can use e.g.
; board_build.arduino.memory_type = qio_opi and sdkconfig.defaults CONFIG_SPIRAM_* per Espressif docs.

extra_scripts =
  pre:scripts/build_html.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  links2004/WebSockets @ 2.7.3
[env:default]
extends = base
build_flags =
  ${base.build_flags}
  -DINX_VERSION=\"${inx.version}-BETA\"

[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DINX_VERSION=\"${inx.version}\"

[env:simulator]
platform = native
custom_run_simulator_target_owner = project
build_src_filter =
  +<*>
  -<simulator/web/>
  -<network/OtaUpdater.cpp>
build_flags =
  -std=gnu++2a
  !sdl2-config --cflags --libs
  -Wno-c++11-narrowing
  -DSIMULATOR
  -DCROSSPOINT_SIMULATOR_PROJECT_WEBSERVER
  -DINX_VERSION=\"${inx.version}-simulator\"
  -DCROSSPOINT_VERSION=\"${inx.version}-simulator\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DDISABLE_FS_H_WARNING=1
  -include${PROJECT_DIR}/src/simulator/SimulatorCompat.h
  -Isrc/simulator
  -Isrc
  -Isrc/system
  -Ilib/GfxRenderer
  -Ilib/EpdFont
  -Ilib/FsHelpers
  -Ilib/JpegToBmpConverter
  -Ilib/PngToBmpConverter
  -Ilib/Serialization
  -Ilib/Utf8
  -Ilib/Txt
  -Ilib/Epub
  -Ilib/OpdsParser
  -Ilib/KOReaderSync
  -Ilib/Xtc
  -Ilib/ZipFile
  -Ilib/miniz
  -Ilib/InflateReader
lib_ignore = hal, WebSockets, PNGdec, JPEGDEC
extra_scripts =
  pre:scripts/build_html.py
  post:.pio/libdeps/$PIOENV/simulator/run_simulator_project.py
lib_deps =
  simulator=https://github.com/crosspoint-reader/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1

[env:simulator_web]
platform = native
custom_run_simulator_target_owner = project
build_src_filter =
  +<simulator/web/web_dashboard_main.cpp>
  +<network/LocalServer.cpp>
  +<state/SystemSetting.cpp>
  +<state/NetworkCredential.cpp>
build_flags =
  -std=gnu++2a
  !sdl2-config --cflags --libs
  -Wno-c++11-narrowing
  -DSIMULATOR
  -DINX_SIMULATOR_WEB_ONLY
  -DCROSSPOINT_SIMULATOR_PROJECT_WEBSERVER
  -DINX_VERSION=\"${inx.version}-simulator-web\"
  -DCROSSPOINT_VERSION=\"${inx.version}-simulator-web\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DDISABLE_FS_H_WARNING=1
  -include${PROJECT_DIR}/src/simulator/SimulatorCompat.h
  -Isrc/simulator/web
  -Isrc/simulator
  -Isrc
  -Isrc/system
lib_ignore = hal, WebSockets, KOReaderSync, Epub, FsHelpers, GfxRenderer, EpdFont
extra_scripts =
  pre:scripts/build_html.py
  post:.pio/libdeps/$PIOENV/simulator/run_simulator_project.py
lib_deps =
  simulator=https://github.com/crosspoint-reader/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
